
dump_mode: doorbell
engine: vllm

num_flush: 1024
probes:
  - phase: model
    class_name: vllm.model_executor.models.gpt_oss.GptOssModel
    inner_graph: false
  - phase: decoder_layer
    class_name: vllm.model_executor.models.gpt_oss.TransformerBlock
    inner_graph: true
  - phase: mlp
    class_name: vllm.model_executor.models.gpt_oss.MLPBlock
    inner_graph: true
  - phase: attention
    class_name: vllm.model_executor.models.gpt_oss.OAIAttention
    inner_graph: true
  - phase: norm
    class_name: vllm.model_executor.layers.layernorm.RMSNorm
    inner_graph: true
  - phase: sampling
    class_name: vllm.v1.sample.sampler.Sampler
    inner_graph: false
exporters:
  # Exporter 1: Save binary trace data to files
  # - class_name: lmtracer.core.exporter.FileByteDataExporter
  #   params:
  #     output_dir: /tmp/lmtracer_exports
  
  # Exporter 2: Export metrics to Prometheus (vLLM specific)
  - class_name: lmtracer.core.exporter.VLLMMetricPrometheusExporter
    params: {}