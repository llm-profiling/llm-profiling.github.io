
dump_mode: doorbell
engine: sglang

num_flush: 1024
probes:
  - phase: model
    class_name: vllm.model_executor.models.gemma3.Gemma3Model
    inner_graph: false
  - phase: decoder_layer
    class_name: vllm.model_executor.models.gemma3.Gemma3DecoderLayer
    inner_graph: true
  - phase: mlp
    class_name: vllm.model_executor.models.gemma3.Gemma3MLP
    inner_graph: true
  - phase: attention
    class_name: vllm.model_executor.models.gemma3.Gemma3Attention
    inner_graph: true
  - phase: sampling
    class_name: vllm.v1.sample.sampler.Sampler
    inner_graph: false
exporter:
  class_name: lmtracer.core.exporter.FileByteDataExporter
  params:
    output_dir: /tmp/lmtracer_exports